 sm_market_debug.10.desc:0 "If you can read this inside a custom window, the §Ycustom_gui§! window works.\n\nLive value pulled from script: your empire owns §Y[GetDbgFleetCount]§! fleet(s).\n\nThe buttons below are this event's options, rendered into the window's option list."
