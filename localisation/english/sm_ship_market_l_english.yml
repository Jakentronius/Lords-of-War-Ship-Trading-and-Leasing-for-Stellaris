 # --- Modifier names ---------------------------------------------------
 sm_mothballed_fleet:0 "Mothballed"
 sm_mothballed_fleet_desc:0 "This fleet is mothballed: immobilised, unable to fight, and using almost no naval capacity. It can be listed for sale at any time, or reactivated from the Mothball Bay (which takes time to recommission)."
 sm_reactivating_fleet:0 "Recommissioning"
 sm_reactivating_fleet_desc:0 "This fleet has left the Ship Market and is being recommissioned. It remains immobilised, unable to fight, and using almost no naval capacity until recommissioning completes, after which it returns to normal service."
 sm_mothball_upkeep_discount:0 "Mothball Fleet Storage"
 sm_mothball_upkeep_discount_desc:0 "Showroom inventory drives commerce: each mothballed fleet increases the £trade£ trade value your empire produces and reduces military ship £alloys£ upkeep. Scales with the number of fleets you have mothballed (whether or not they are listed for sale)."
 sm_lease_income:0 "Fleet Lease Income"
 sm_lease_income_desc:0 "Monthly fees from fleets your empire has leased out, paid by the lessees for as long as the contracts run. Counted in your monthly £trade£ trade value."
 sm_lease_expense:0 "Fleet Lease Fees"
 sm_lease_expense_desc:0 "Monthly fees for the fleets your empire is leasing, paid to the lessors for as long as the contracts run. Deducted from your monthly £trade£ trade value."
