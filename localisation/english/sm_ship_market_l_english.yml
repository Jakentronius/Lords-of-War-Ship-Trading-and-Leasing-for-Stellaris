l_english:
 # v0.9.23 iconographic pass. Row grammar: fixed-width cells (icons + numbers)
 # FIRST, variable-width names LAST - proportional font only aligns the left edge.
 # Icon vocabulary (all base-game text icons, verified in 4.4.3):
 #   £trade£ price/fee  £alloys£ hull value  £military_power£ fleet power
 #   £fleet_size£ ship count  £time£ days/pending  £market£ buy/sell
 #   £deep_sleep£ mothballed  £upgrade_ship£ wake  £contract£ lease
 #   £trigger_yes£ confirm/active  £trigger_no£ decline/retract/terminate
 #   £empire£ empire pick
 #   ship classes: £ship_size_military_1£ corvette  £ship_size_military_1_torpedo£
 #   frigate  £ship_size_military_2£ destroyer  £ship_size_military_4£ cruiser
 #   £ship_size_military_8£ battleship  £ship_size_military_16£ titan
 # The icon legend lives ONCE, in the HUD launcher tooltip (sm_tile_market_tt).

 # --- Edicts -----------------------------------------------------------
 # Edict display names REQUIRE the edict_ prefix (vanilla: edict_<name>).
 edict_sm_open_ship_market:0 "Ship Market"
 edict_sm_open_ship_market_desc:0 "Opens the Ship Market dashboard. You can also use the §YShip Market§! button at the top-left of the screen."
 edict_sm_export_subsidies:0 "Export Subsidies"
 edict_sm_export_subsidies_desc:0 "Every hull sold abroad carries a quiet co-payment from the treasury. Buyers see a bargain; our yards see full price; the ledger sees strategy.\n\n§HOffers and listings made while active read §Y~30%§!§H cheaper to AI evaluators without reducing what you are paid.§!"
 edict_sm_wartime_brokerage:0 "Wartime Brokerage"
 edict_sm_wartime_brokerage_desc:0 "Special envoys with sample cases and generous credit terms are dispatched wherever the shooting starts. Empires §Yat war§! will pay up to §Y~50%§! over a fair price without balking.\n\n§HConflict, regrettably, is good for business.§!"

 # --- Civics (v0.9.29) --------------------------------------------------
 civic_sm_arms_consortium:0 "Arms Consortium"
 civic_sm_arms_consortium_desc:0 "Neutrality, properly monetised: this society arms all sides with equal courtesy, impeccable paperwork, and a modest markup.\n\n§H- £trade£ Trade value: §G+5%§!\n- Customers are §G25%§!§H more likely to accept fleet offers\n- Deals are struck §Gtwice as often§!§H - even §Ywhile at war§!\n- Mothballed inventory bonus (£trade£/£alloys£) §G+50%§!§H stronger\n- Waking a mothballed fleet takes §G270§!§H days (from 360)\n- Pacifist and xenophile empires: §R-20§!§H opinion (Merchants of Death)§!"
 civic_sm_fleet_chandlers:0 "Fleet Chandlers"
 civic_sm_fleet_chandlers_desc:0 "The galaxy's premier full-service naval outfitter: sale, lease, or lease-to-own, with financing approved before the ink - or the blood - is dry.\n\n§H- £trade£ Trade value: §G+5%§!\n- Customers are §G25%§!§H more likely to accept fleet offers\n- Deals are struck §Gtwice as often§!§H - even §Ywhile at war§!\n- Mothballed inventory bonus (£trade£/£alloys£) §G+50%§!§H stronger\n- Waking a mothballed fleet takes §G270§!§H days (from 360)\n- Pacifist and xenophile empires: §R-20§!§H opinion (Merchants of Death)§!"
 civic_sm_assembly_line_shipwrights:0 "Assembly-Line Shipwrights"
 civic_sm_assembly_line_shipwrights_desc:0 "Standardised frames, interchangeable parts, and a tolerance for tolerances. The catalogue ships on time; the warranty is another department.\n\n§H- £trade£ Your hulls appraise §G+20%§!§H on the Ship Market (catalogue pricing)\n- Ships serving under §Yyour§!§H flag suffer the corner-cutting; ships §Ysold§!§H recommission to the buyer's own standards, and §Yleased§!§H fleets are tuned to contract spec at signing.§!"

 # Fleet-scope compensator on leased fleets from a Shipwright lessor.
 sm_lease_shipwright_tune:0 "Tuned to Contract Spec"
 sm_lease_shipwright_tune_desc:0 "This leased fleet has been refitted to the standards promised in the contract, compensating for its builder's assembly-line corner-cutting."

 # Standing malus toward dedicated arms dealers.
 triggered_opinion_sm_merchants_of_death:0 "Merchants of Death"

