 # --- Debug ------------------------------------------------------------
 sm_market_debug.1.name:0 "[DEBUG] Clear All Listings"
 sm_market_debug.1.desc:0 "Force-unlists every Ship Market listing in the galaxy (begins recommission). Use if a listing becomes stuck."
 sm_market_debug.2.name:0 "[DEBUG] Unlist My Fleets"
 sm_market_debug.2.desc:0 "Unlists any of your own fleets still flagged as listed, and refreshes your listing modifiers."
 sm_market_debug.3.name:0 "[DEBUG] Force AI Listings"
 sm_market_debug.3.desc:0 "Forces every eligible AI empire (at peace, with spare fleets) to list a surplus fleet for sale right now. Use to verify AI sellers - the listings then appear in the galactic market."
 sm_market_debug.4.name:0 "[DEBUG] Force AI Purchases"
 sm_market_debug.4.desc:0 "Forces every eligible AI empire to try buying a fairly-priced listing right now. Use to verify AI buyers and to trigger trades on demand (enable Trade Watch first to see them)."
 sm_market_debug.5.name:0 "[DEBUG] Toggle Trade Watch"
 sm_market_debug.5.desc:0 "Toggles trade-watch notifications. While on, every AI purchase pops a message telling you who bought what from whom and for how much."
 sm_market_debug.6.name:0 "[DEBUG] Toggle AI Deal Frenzy"
 sm_market_debug.6.desc:0 "Toggles AI deal frenzy. While on, every eligible AI attempts a deal (lease offer, sale offer, or board listing) EVERY month, ignoring the 1-year cooldown. Excess-fleet, one-deal-at-a-time, and slot rules still apply."
 sm_market_debug.7.name:0 "[DEBUG] Force AI Deals Now"
 sm_market_debug.7.desc:0 "Every eligible AI immediately attempts one deal (targeted lease/sale offer or board listing), ignoring the monthly chance and cooldown. Combine with §Ysm_debug_ai_autoaccept§! to watch deals complete instantly."
 sm_market_debug.8.name:0 "[DEBUG] Mothball State Report"
 sm_market_debug.8.desc:0 "§HMOTHBALL STATE REPORT§!\n\n£shipclass_military£ military fleets §Y[GetDbgmMil]§!   £deep_sleep£ flag §Y[GetDbgmFlag]§! / modifier §Y[GetDbgmMod]§!   §Rdesynced [GetDbgmDesync]§!\n£market£ listed §Y[GetDbgmListed]§!   £time£ offer-pending §Y[GetDbgmPending]§!   £contract£ leased out §Y[GetDbgmLout]§!   £upgrade_ship£ recommissioning §Y[GetDbgmReact]§!\noff-map (MIA) §Y[GetDbgmOffmap]§!   §Hmothballed+off-map [GetDbgmMothoff] (should be 0!)§!   in combat §Y[GetDbgmCombat]§!\n\n§HIf pickers claim 'no mothballed fleets' while flag/modifier counts are right, the culprit is whichever count above disagrees with reality.§!"
 sm_market_debug.8.repair:0 "Repair state (reconcile flag/modifier + refresh upkeep) and re-run"
 sm_flag_0:0 "0"
 sm_flag_1:0 "1"
 sm_market_debug.9.name:0 "[DEBUG] Toggle Telemetry"
 sm_market_debug.9.desc:0 "Toggles market telemetry. While on, every empire logs a yearly census line (§YSM_TELEM§!) to game.log; completed deals always log ledger lines (§YSM_DEAL§!). Parse with tools/parse_telemetry.py after an observer run."
 # Custom-GUI probe (fire: event sm_market_debug.10)
